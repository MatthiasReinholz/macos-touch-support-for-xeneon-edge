name: Release macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_type:
        description: "Semantic version bump to apply to the latest release tag"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      release_name:
        description: "Optional release title"
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve signing mode
        id: signing
        shell: bash
        env:
          APPLE_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SIGNING_ENABLED="false"
          NOTARIZATION_ENABLED="false"
          SIGN_IDENTITY="-"

          if [[ -n "${APPLE_SIGNING_CERTIFICATE_P12_BASE64}" && -n "${APPLE_SIGNING_CERTIFICATE_PASSWORD}" && -n "${APPLE_SIGNING_IDENTITY}" ]]; then
            SIGNING_ENABLED="true"
            SIGN_IDENTITY="${APPLE_SIGNING_IDENTITY}"
          fi

          if [[ "${SIGNING_ENABLED}" == "true" && -n "${APPLE_ID}" && -n "${APPLE_APP_SPECIFIC_PASSWORD}" && -n "${APPLE_TEAM_ID}" ]]; then
            NOTARIZATION_ENABLED="true"
          fi

          echo "signing_enabled=${SIGNING_ENABLED}" >> "${GITHUB_OUTPUT}"
          echo "notarization_enabled=${NOTARIZATION_ENABLED}" >> "${GITHUB_OUTPUT}"
          echo "sign_identity=${SIGN_IDENTITY}" >> "${GITHUB_OUTPUT}"

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            BUMP="${{ inputs.release_type }}"
            NAME="${{ inputs.release_name }}"
            PRERELEASE="${{ inputs.prerelease }}"

            LATEST_TAG="$(git tag --list 'v*' --sort=-version:refname | awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/ { print; exit }')"
            if [[ -z "${LATEST_TAG}" ]]; then
              MAJOR=0
              MINOR=0
              PATCH=0
            else
              VERSION="${LATEST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION}"
            fi

            case "${BUMP}" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
              *)
                echo "Unsupported release_type: ${BUMP}" >&2
                exit 1
                ;;
            esac

            TAG="v${MAJOR}.${MINOR}.${PATCH}"
          else
            TAG="${GITHUB_REF_NAME}"
            NAME="${GITHUB_REF_NAME}"
            PRERELEASE="false"
          fi

          if [[ -z "${NAME}" ]]; then
            NAME="${TAG}"
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "name=${NAME}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"

      - name: Create release tag for manual runs
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          script: |
            const tag = 'refs/tags/${{ steps.meta.outputs.tag }}';
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${{ steps.meta.outputs.tag }}`
              });
              core.info(`Tag ${{ steps.meta.outputs.tag }} already exists.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: tag,
                sha: context.sha
              });
              core.info(`Created tag ${{ steps.meta.outputs.tag }} at ${context.sha}.`);
            }

      - name: Import Apple signing certificate
        if: steps.signing.outputs.signing_enabled == 'true'
        shell: bash
        env:
          APPLE_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/xeneon-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="${RUNNER_TEMP}/xeneon-signing-cert.p12"
          LOGIN_KEYCHAIN="$(security login-keychain | tr -d '"')"

          echo "${APPLE_SIGNING_CERTIFICATE_P12_BASE64}" | base64 --decode > "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -k "${KEYCHAIN_PATH}" -P "${APPLE_SIGNING_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" "${LOGIN_KEYCHAIN}"
          security default-keychain -d user -s "${KEYCHAIN_PATH}"

          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          echo "KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}" >> "${GITHUB_ENV}"
          echo "CERT_PATH=${CERT_PATH}" >> "${GITHUB_ENV}"
          echo "LOGIN_KEYCHAIN=${LOGIN_KEYCHAIN}" >> "${GITHUB_ENV}"

      - name: Build app bundle
        env:
          SIGN_IDENTITY: ${{ steps.signing.outputs.sign_identity }}
        run: make clean app SIGN_IDENTITY="${SIGN_IDENTITY}"

      - name: Notarize and staple app
        if: steps.signing.outputs.notarization_enabled == 'true'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          TEMP_ZIP="${RUNNER_TEMP}/XeneonTouchSupport-notarization.zip"
          ditto -c -k --sequesterRsrc --keepParent "build/XeneonTouchSupport.app" "${TEMP_ZIP}"
          xcrun notarytool submit "${TEMP_ZIP}" \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait
          xcrun stapler staple "build/XeneonTouchSupport.app"
          xcrun stapler validate "build/XeneonTouchSupport.app"

      - name: Package release zip
        run: make package

      - name: Show release signing mode
        shell: bash
        run: |
          echo "Signing enabled: ${{ steps.signing.outputs.signing_enabled }}"
          echo "Notarization enabled: ${{ steps.signing.outputs.notarization_enabled }}"
          echo "Signing identity: ${{ steps.signing.outputs.sign_identity }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: XeneonTouchSupport-macOS
          path: build/XeneonTouchSupport-macOS.zip

      - name: Create or update GitHub release
        uses: actions/github-script@v8
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          NAME: ${{ steps.meta.outputs.name }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.TAG;
            const name = process.env.NAME;
            const prerelease = process.env.PRERELEASE === "true";

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });

              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                tag_name: tag,
                name,
                prerelease,
                draft: false,
              });
              core.info(`Updated release ${tag}.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name,
                prerelease,
                draft: false,
                generate_release_notes: true,
                target_commitish: context.sha,
              });
              core.info(`Created release ${tag}.`);
            }

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.meta.outputs.tag }}" build/XeneonTouchSupport-macOS.zip --clobber

      - name: Clean up signing keychain
        if: always() && steps.signing.outputs.signing_enabled == 'true'
        shell: bash
        run: |
          if [[ -n "${LOGIN_KEYCHAIN}" ]]; then
            security default-keychain -d user -s "${LOGIN_KEYCHAIN}" || true
            security list-keychains -d user -s "${LOGIN_KEYCHAIN}" || true
          fi
          if [[ -n "${KEYCHAIN_PATH}" ]]; then
            security delete-keychain "${KEYCHAIN_PATH}" || true
          fi
          if [[ -n "${CERT_PATH}" ]]; then
            rm -f "${CERT_PATH}"
          fi
