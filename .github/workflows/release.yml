name: Release macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_type:
        description: "Semantic version bump to apply to the latest release tag"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      release_name:
        description: "Optional release title"
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            BUMP="${{ inputs.release_type }}"
            NAME="${{ inputs.release_name }}"
            PRERELEASE="${{ inputs.prerelease }}"

            LATEST_TAG="$(git tag --list 'v*' --sort=-version:refname | awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/ { print; exit }')"
            if [[ -z "${LATEST_TAG}" ]]; then
              MAJOR=0
              MINOR=0
              PATCH=0
            else
              VERSION="${LATEST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION}"
            fi

            case "${BUMP}" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
              *)
                echo "Unsupported release_type: ${BUMP}" >&2
                exit 1
                ;;
            esac

            TAG="v${MAJOR}.${MINOR}.${PATCH}"
          else
            TAG="${GITHUB_REF_NAME}"
            NAME="${GITHUB_REF_NAME}"
            PRERELEASE="false"
          fi

          if [[ -z "${NAME}" ]]; then
            NAME="${TAG}"
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "name=${NAME}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"

      - name: Create release tag for manual runs
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          script: |
            const tag = 'refs/tags/${{ steps.meta.outputs.tag }}';
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${{ steps.meta.outputs.tag }}`
              });
              core.info(`Tag ${{ steps.meta.outputs.tag }} already exists.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: tag,
                sha: context.sha
              });
              core.info(`Created tag ${{ steps.meta.outputs.tag }} at ${context.sha}.`);
            }

      - name: Build app bundle and zip
        run: make clean zip

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: XeneonTouchSupport-macOS
          path: build/XeneonTouchSupport-macOS.zip

      - name: Create or update GitHub release
        uses: actions/github-script@v8
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          NAME: ${{ steps.meta.outputs.name }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.TAG;
            const name = process.env.NAME;
            const prerelease = process.env.PRERELEASE === "true";

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });

              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                tag_name: tag,
                name,
                prerelease,
                draft: false,
              });
              core.info(`Updated release ${tag}.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name,
                prerelease,
                draft: false,
                generate_release_notes: true,
                target_commitish: context.sha,
              });
              core.info(`Created release ${tag}.`);
            }

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.meta.outputs.tag }}" build/XeneonTouchSupport-macOS.zip --clobber
